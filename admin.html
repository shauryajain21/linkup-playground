<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkup Labs — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#FFF;--bg2:#F7F7F7;--bg3:#F0F0F0;
            --t1:#1A1A1A;--t2:#555;--t3:#8C8C8C;--t4:#B0B0B0;
            --acc:#0052CC;--acc2:#003D99;--acc-bg:#E8F0FE;
            --brd:#E5E5E5;--brd2:#D0D0D0;
            --ok:#059669;--err:#DC2626;
            --f:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
            --m:'JetBrains Mono','SF Mono',monospace;
        }
        body{font-family:var(--f);background:var(--bg2);color:var(--t1);line-height:1.5;-webkit-font-smoothing:antialiased}

        .nav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;border-bottom:1px solid var(--brd);background:var(--bg);position:relative}
        .nav::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--acc)}
        .nav-l{display:flex;align-items:center;gap:12px}
        .nav-logo svg{height:22px;width:auto;display:block}
        .nav-sep{width:1px;height:20px;background:var(--brd)}
        .nav-t{font-size:14px;font-weight:500;color:var(--t2)}
        .nav-tag{font-family:var(--m);font-size:9px;font-weight:500;color:var(--t3);background:var(--bg3);border:1px solid var(--brd);padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.8px}

        .container{max-width:720px;margin:40px auto;padding:0 24px}

        h1{font-size:28px;font-weight:700;letter-spacing:-.8px;margin-bottom:8px}
        .sub{font-size:14px;color:var(--t2);margin-bottom:32px}

        .card{background:var(--bg);border:1px solid var(--brd);border-radius:12px;padding:28px;margin-bottom:20px}
        .card-title{font-family:var(--m);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:16px}

        .fg{margin-bottom:18px}
        .fg:last-child{margin-bottom:0}
        .fl{display:block;font-size:13px;font-weight:600;color:var(--t1);margin-bottom:6px}
        .fh{font-weight:400;color:var(--t3);font-size:12px}

        input[type="text"],input[type="url"],textarea{
            font-family:var(--f);font-size:14px;padding:10px 14px;
            border:1px solid var(--brd);border-radius:8px;width:100%;
            outline:none;transition:all .15s;background:var(--bg);color:var(--t1);
        }
        input:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(0,82,204,.06)}
        textarea{resize:vertical;min-height:60px;line-height:1.5}

        .query-list{display:flex;flex-direction:column;gap:10px}
        .query-item{display:flex;gap:8px;align-items:start}
        .query-item input{flex:1}
        .query-item select{
            font-family:var(--f);font-size:12px;padding:10px 8px;
            border:1px solid var(--brd);border-radius:8px;background:var(--bg);
            color:var(--t1);outline:none;width:120px;cursor:pointer;
        }
        .query-item select:focus{border-color:var(--acc)}
        .remove-btn{
            font-size:18px;color:var(--t4);background:none;border:none;
            cursor:pointer;padding:8px 4px;transition:color .1s;flex-shrink:0;
        }
        .remove-btn:hover{color:var(--err)}

        .add-btn{
            font-family:var(--m);font-size:12px;color:var(--acc);background:none;
            border:1px dashed var(--brd);padding:10px;border-radius:8px;
            cursor:pointer;width:100%;text-align:center;transition:all .12s;margin-top:10px;
        }
        .add-btn:hover{background:var(--acc-bg);border-color:var(--acc)}

        .gen-btn{
            font-family:var(--f);font-size:14px;font-weight:600;padding:14px 28px;
            background:var(--acc);color:#fff;border:none;border-radius:8px;
            cursor:pointer;width:100%;transition:all .12s;display:flex;
            align-items:center;justify-content:center;gap:8px;
        }
        .gen-btn:hover{background:var(--acc2)}
        .gen-btn .sq{width:8px;height:8px;background:#fff;border-radius:1px}

        /* Output */
        .output{display:none;margin-top:24px}
        .output.vis{display:block;animation:up .2s ease}
        @keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

        .link-card{
            background:#0D0D0D;border:1px solid #2A2A2A;border-radius:12px;
            padding:24px;color:#E0E0E0;
        }
        .link-label{font-family:var(--m);font-size:10px;color:#6EE7B7;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
        .link-url{
            font-family:var(--m);font-size:13px;color:#7DD3FC;
            word-break:break-all;line-height:1.6;margin-bottom:16px;
            padding:14px;background:#141414;border:1px solid #2A2A2A;border-radius:8px;
            cursor:pointer;transition:background .1s;
        }
        .link-url:hover{background:#1A1A1A}
        .link-actions{display:flex;gap:10px}
        .link-btn{
            font-family:var(--m);font-size:11px;padding:8px 16px;border-radius:6px;
            cursor:pointer;transition:all .12s;border:1px solid #333;background:#1A1A1A;color:#999;
        }
        .link-btn:hover{background:#222;color:#ddd;border-color:#444}
        .link-btn.primary{background:var(--acc);color:#fff;border-color:var(--acc)}
        .link-btn.primary:hover{background:var(--acc2)}

        .preview-frame{
            margin-top:16px;border:1px solid #2A2A2A;border-radius:8px;
            overflow:hidden;height:400px;display:none;
        }
        .preview-frame.vis{display:block}
        .preview-frame iframe{width:100%;height:100%;border:none}

        /* Logo preview */
        .logo-preview{
            margin-top:8px;padding:12px;background:var(--bg3);border-radius:8px;
            display:none;align-items:center;gap:12px;
        }
        .logo-preview.vis{display:flex}
        .logo-preview img{height:32px;width:auto;max-width:200px;object-fit:contain}
        .logo-preview span{font-size:12px;color:var(--t3)}

        .saved-configs{margin-top:32px}
        .saved-title{font-family:var(--m);font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
        .saved-item{
            display:flex;align-items:center;justify-content:space-between;
            padding:12px 16px;background:var(--bg);border:1px solid var(--brd);
            border-radius:8px;margin-bottom:8px;transition:all .1s;
        }
        .saved-item:hover{border-color:var(--brd2)}
        .saved-name{font-size:14px;font-weight:500}
        .saved-meta{font-family:var(--m);font-size:11px;color:var(--t3)}
        .saved-actions{display:flex;gap:6px}
        .saved-btn{
            font-family:var(--m);font-size:10px;padding:4px 10px;border-radius:4px;
            cursor:pointer;border:1px solid var(--brd);background:var(--bg);color:var(--t2);
            transition:all .1s;
        }
        .saved-btn:hover{border-color:var(--brd2);color:var(--t1)}
        .saved-btn.del:hover{color:var(--err);border-color:#FECACA}
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-l">
        <div class="nav-logo">
            <svg viewBox="0 0 501 128" fill="none" xmlns="http://www.w3.org/2000/svg">

            </svg>
        </div>
        <div class="nav-sep"></div>
        <span class="nav-t">Labs</span>
        <span class="nav-tag">Admin</span>
    </div>
</nav>

<div class="container">
    <h1>Create a demo link</h1>
    <p class="sub">Configure a branded playground for your customer with pre-built queries.</p>

    <!-- Customer Info -->
    <div class="card">
        <div class="card-title">Customer</div>
        <div class="fg">
            <label class="fl">Company Name</label>
            <input type="text" id="companyName" placeholder="e.g. Acme Corp">
        </div>
        <div class="fg">
            <label class="fl">Logo URL <span class="fh">(direct link to image)</span></label>
            <input type="url" id="logoUrl" placeholder="https://example.com/logo.png" oninput="previewLogo()">
            <div class="logo-preview" id="logoPreview">
                <img id="logoImg" src="" alt="Logo preview">
                <span>Preview</span>
            </div>
        </div>
        <div class="fg">
            <label class="fl">API Key <span class="fh">(pre-filled for the customer)</span></label>
            <input type="text" id="apiKey" placeholder="lk-...">
        </div>
    </div>

    <!-- Queries -->
    <div class="card">
        <div class="card-title">Pre-built Queries</div>
        <p style="font-size:13px;color:var(--t2);margin-bottom:16px">These will appear as selectable options in the playground. The customer can pick one or type their own.</p>
        <div class="query-list" id="queryList">
            <div class="query-item">
                <input type="text" placeholder="e.g. What is the latest funding round for Acme Corp?">
                <select>
                    <option value="standard">Standard</option>
                    <option value="fast">Fast</option>
                    <option value="deep">Deep</option>
                </select>
                <button class="remove-btn" onclick="removeQuery(this)">&times;</button>
            </div>
        </div>
        <button class="add-btn" onclick="addQuery()">+ Add query</button>
    </div>

    <!-- Settings -->
    <div class="card">
        <div class="card-title">Settings</div>
        <div class="fg">
            <label class="fl">Default Output Type</label>
            <select id="defaultOutput" style="font-family:var(--f);font-size:14px;padding:10px 14px;border:1px solid var(--brd);border-radius:8px;background:var(--bg);color:var(--t1);width:100%;outline:none;">
                <option value="sourcedAnswer">sourcedAnswer</option>
                <option value="searchResults">searchResults</option>
                <option value="structured">structured</option>
            </select>
        </div>
        <div class="fg">
            <label class="fl">Default Depth</label>
            <select id="defaultDepth" style="font-family:var(--f);font-size:14px;padding:10px 14px;border:1px solid var(--brd);border-radius:8px;background:var(--bg);color:var(--t1);width:100%;outline:none;">
                <option value="standard">Standard</option>
                <option value="fast">Fast</option>
                <option value="deep">Deep</option>
            </select>
        </div>
    </div>

    <!-- Generate -->
    <button class="gen-btn" onclick="generate()">
        <span class="sq"></span>
        Generate Demo Link
    </button>

    <!-- Output -->
    <div class="output" id="output">
        <div class="link-card">
            <div class="link-label">Demo link</div>
            <div class="link-url" id="linkUrl" onclick="copyLink()"></div>
            <div class="link-actions">
                <button class="link-btn primary" onclick="copyLink()">Copy link</button>
                <button class="link-btn" onclick="openLink()">Open in new tab</button>
                <button class="link-btn" onclick="togglePreview()">Preview</button>
                <button class="link-btn" onclick="saveConfig()">Save locally</button>
            </div>
            <div class="preview-frame" id="previewFrame">
                <iframe id="previewIframe"></iframe>
            </div>
        </div>
    </div>

    <!-- Saved Configs -->
    <div class="saved-configs" id="savedSection" style="display:none">
        <div class="saved-title">Saved Configs</div>
        <div id="savedList"></div>
    </div>
</div>

<script>
let generatedUrl = '';

function addQuery() {
    const list = document.getElementById('queryList');
    const item = document.createElement('div');
    item.className = 'query-item';
    item.innerHTML = `
        <input type="text" placeholder="e.g. Find the pricing page for ...">
        <select>
            <option value="standard">Standard</option>
            <option value="fast">Fast</option>
            <option value="deep">Deep</option>
        </select>
        <button class="remove-btn" onclick="removeQuery(this)">&times;</button>
    `;
    list.appendChild(item);
}

function removeQuery(btn) {
    const list = document.getElementById('queryList');
    if (list.children.length > 1) {
        btn.closest('.query-item').remove();
    }
}

function previewLogo() {
    const url = document.getElementById('logoUrl').value.trim();
    const preview = document.getElementById('logoPreview');
    const img = document.getElementById('logoImg');
    if (url) {
        img.src = url;
        img.onerror = () => preview.classList.remove('vis');
        img.onload = () => preview.classList.add('vis');
    } else {
        preview.classList.remove('vis');
    }
}

function getConfig() {
    const queries = [];
    document.querySelectorAll('.query-item').forEach(item => {
        const q = item.querySelector('input').value.trim();
        const d = item.querySelector('select').value;
        if (q) queries.push({ q, depth: d });
    });

    return {
        name: document.getElementById('companyName').value.trim(),
        logo: document.getElementById('logoUrl').value.trim(),
        key: document.getElementById('apiKey').value.trim(),
        queries,
        output: document.getElementById('defaultOutput').value,
        depth: document.getElementById('defaultDepth').value,
    };
}

function generate() {
    const config = getConfig();
    if (!config.name) { alert('Enter a company name'); return; }

    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(config))));
    const base = window.location.origin;
    generatedUrl = `${base}/index.html?c=${encoded}`;

    document.getElementById('linkUrl').textContent = generatedUrl;
    document.getElementById('output').classList.add('vis');
    document.getElementById('previewFrame').classList.remove('vis');
}

function copyLink() {
    navigator.clipboard.writeText(generatedUrl).then(() => {
        const el = document.getElementById('linkUrl');
        const orig = el.textContent;
        el.textContent = 'Copied!';
        setTimeout(() => el.textContent = orig, 1500);
    });
}

function openLink() {
    if (generatedUrl) window.open(generatedUrl, '_blank');
}

function togglePreview() {
    const frame = document.getElementById('previewFrame');
    frame.classList.toggle('vis');
    if (frame.classList.contains('vis')) {
        document.getElementById('previewIframe').src = generatedUrl;
    }
}

function saveConfig() {
    const config = getConfig();
    if (!config.name) return;

    const saved = JSON.parse(localStorage.getItem('linkup_configs') || '[]');
    const existing = saved.findIndex(s => s.name === config.name);
    if (existing >= 0) saved[existing] = { ...config, url: generatedUrl, date: new Date().toISOString() };
    else saved.push({ ...config, url: generatedUrl, date: new Date().toISOString() });
    localStorage.setItem('linkup_configs', JSON.stringify(saved));
    renderSaved();
}

function renderSaved() {
    const saved = JSON.parse(localStorage.getItem('linkup_configs') || '[]');
    const section = document.getElementById('savedSection');
    const list = document.getElementById('savedList');
    if (!saved.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = saved.map((s, i) => `
        <div class="saved-item">
            <div>
                <div class="saved-name">${esc(s.name)}</div>
                <div class="saved-meta">${s.queries ? s.queries.length : 0} queries &middot; ${new Date(s.date).toLocaleDateString()}</div>
            </div>
            <div class="saved-actions">
                <button class="saved-btn" onclick="loadConfig(${i})">Load</button>
                <button class="saved-btn" onclick="copySaved(${i})">Copy link</button>
                <button class="saved-btn del" onclick="deleteSaved(${i})">Delete</button>
            </div>
        </div>
    `).join('');
}

function loadConfig(i) {
    const saved = JSON.parse(localStorage.getItem('linkup_configs') || '[]');
    const c = saved[i]; if (!c) return;
    document.getElementById('companyName').value = c.name || '';
    document.getElementById('logoUrl').value = c.logo || '';
    document.getElementById('apiKey').value = c.key || '';
    document.getElementById('defaultOutput').value = c.output || 'sourcedAnswer';
    document.getElementById('defaultDepth').value = c.depth || 'standard';
    previewLogo();

    const list = document.getElementById('queryList');
    list.innerHTML = '';
    (c.queries || []).forEach(q => {
        const item = document.createElement('div');
        item.className = 'query-item';
        item.innerHTML = `<input type="text" value="${esc(q.q)}"><select><option value="standard" ${q.depth==='standard'?'selected':''}>Standard</option><option value="fast" ${q.depth==='fast'?'selected':''}>Fast</option><option value="deep" ${q.depth==='deep'?'selected':''}>Deep</option></select><button class="remove-btn" onclick="removeQuery(this)">&times;</button>`;
        list.appendChild(item);
    });
    if (!list.children.length) addQuery();

    if (c.url) {
        generatedUrl = c.url;
        document.getElementById('linkUrl').textContent = c.url;
        document.getElementById('output').classList.add('vis');
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function copySaved(i) {
    const saved = JSON.parse(localStorage.getItem('linkup_configs') || '[]');
    if (saved[i] && saved[i].url) navigator.clipboard.writeText(saved[i].url);
}

function deleteSaved(i) {
    const saved = JSON.parse(localStorage.getItem('linkup_configs') || '[]');
    saved.splice(i, 1);
    localStorage.setItem('linkup_configs', JSON.stringify(saved));
    renderSaved();
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Init
renderSaved();
</script>
</body>
</html>
